<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FUDMA CS — Project Management Unit</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  
  <style>
    /* ==========================================================================
       1. CSS VARIABLES & THEMING
       ========================================================================== */
    :root {
      /* Dark Theme (Default Base) */
      --bg: #0a0e17;
      --bg2: #0f1623;
      --bg3: #151d2e;
      --surface: #1a2336;
      --surface2: #1f2a3e;
      --border: #263247;
      --border2: #2e3d57;
      --border-hover: #3b4b6b;
      
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --accent3: #1d4ed8;
      --accent-alpha: rgba(59, 130, 246, 0.15);
      
      --green: #10b981;
      --green2: #059669;
      --green-alpha: rgba(16, 185, 129, 0.15);
      
      --yellow: #f59e0b;
      --orange: #f97316;
      --warning-alpha: rgba(245, 158, 11, 0.15);
      
      --red: #ef4444;
      --red2: #dc2626;
      --danger-alpha: rgba(239, 68, 68, 0.15);
      
      --purple: #8b5cf6;
      --purple-alpha: rgba(139, 92, 246, 0.15);
      
      --cyan: #06b6d4;
      --cyan-alpha: rgba(6, 182, 212, 0.15);
      
      --text: #f8fafc;
      --text2: #cbd5e1;
      --text3: #94a3b8;
      --text-muted: #64748b;
      
      --radius-sm: 6px;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
      
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      
      --header-height: 64px;
      --sidebar-width: 260px;
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --bg2: #ffffff;
      --bg3: #f1f5f9;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --border2: #cbd5e1;
      --border-hover: #94a3b8;
      
      --text: #0f172a;
      --text2: #334155;
      --text3: #64748b;
      --text-muted: #94a3b8;
      
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.12);
    }

    /* ==========================================================================
       2. RESET & BASE STYLES
       ========================================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 15px;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { text-decoration: none; color: inherit; }
    ul, ol { list-style: none; }
    button, input, select, textarea { font-family: inherit; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: var(--radius-full); }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    /* ==========================================================================
       3. ANIMATIONS
       ========================================================================== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(15px); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes scaleIn {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 var(--accent-alpha); }
      50% { box-shadow: 0 0 0 4px var(--accent-alpha); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .scale-in { animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* ==========================================================================
       4. TYPOGRAPHY & UTILITIES
       ========================================================================== */
    .heading-1 { font-family: var(--font-display); font-size: 2rem; font-weight: 800; line-height: 1.2; letter-spacing: -0.02em; }
    .heading-2 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; line-height: 1.3; }
    .heading-3 { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; line-height: 1.4; }
    .heading-4 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; }
    
    .text-gradient {
      background: linear-gradient(135deg, var(--accent2), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .text-sm { font-size: 0.875rem; }
    .text-xs { font-size: 0.75rem; }
    .text-muted { color: var(--text3); }
    .font-medium { font-weight: 500; }
    .font-semibold { font-weight: 600; }
    .font-bold { font-weight: 700; }

    .flex { display: flex; }
    .flex-col { display: flex; flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 0.75rem; }
    .gap-4 { gap: 1rem; }
    .gap-6 { gap: 1.5rem; }
    .w-full { width: 100%; }
    .h-full { height: 100%; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-4 { margin-top: 1rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-4 { margin-bottom: 1rem; }
    .mb-6 { margin-bottom: 1.5rem; }

    /* ==========================================================================
       5. COMPONENTS
       ========================================================================== */
    
    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      white-space: nowrap;
      user-select: none;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent3), var(--accent));
      color: #ffffff;
      border-color: var(--accent3);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
    }

    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--surface2);
      border-color: var(--border2);
    }

    .btn-success {
      background: linear-gradient(135deg, var(--green2), var(--green));
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }

    .btn-danger {
      background: linear-gradient(135deg, var(--red2), var(--red));
      color: #ffffff;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
    }

    .btn-ghost:hover:not(:disabled) {
      background: var(--surface);
      color: var(--text);
    }

    .btn-sm {
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      border-radius: 6px;
    }

    .btn-lg {
      padding: 1rem 2rem;
      font-size: 1.05rem;
      border-radius: var(--radius);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text2);
      position: relative;
    }

    .icon-btn:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border2);
    }

    /* Cards */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .card-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: rgba(255,255,255,0.01);
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }

    .card-body {
      padding: 1.5rem;
    }

    /* Forms */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 0.5rem;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s, background-color 0.3s;
      outline: none;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-alpha);
      background: var(--bg2);
    }

    .form-input::placeholder, .form-textarea::placeholder {
      color: var(--text-muted);
    }

    .form-select {
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 1rem top 50%;
      background-size: 0.65rem auto;
      padding-right: 2.5rem;
    }

    .form-select option {
      background: var(--bg2);
      color: var(--text);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.5;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.5rem 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-alpha);
    }

    .search-bar input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.9rem;
      font-family: var(--font-body);
      flex: 1;
      width: 100%;
    }

    /* Badges & Tags */
    .badge-status {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: capitalize;
    }

    .badge-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-proposal { background: var(--surface2); color: var(--text2); }
    .status-proposal::before { background: var(--text3); }
    
    .status-approved { background: var(--cyan-alpha); color: var(--cyan); }
    .status-approved::before { background: var(--cyan); }
    
    .status-in_progress { background: var(--accent-alpha); color: var(--accent2); }
    .status-in_progress::before { background: var(--accent); animation: pulse-glow 2s infinite; }
    
    .status-submitted { background: var(--purple-alpha); color: var(--purple); }
    .status-submitted::before { background: var(--purple); }
    
    .status-revision { background: var(--warning-alpha); color: var(--yellow); }
    .status-revision::before { background: var(--yellow); }
    
    .status-completed { background: var(--green-alpha); color: var(--green); }
    .status-completed::before { background: var(--green); }
    
    .status-rejected { background: var(--danger-alpha); color: var(--red); }
    .status-rejected::before { background: var(--red); }

    .role-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .role-student { background: var(--accent-alpha); color: var(--accent2); border: 1px solid rgba(59,130,246,0.2); }
    .role-supervisor { background: var(--green-alpha); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
    .role-coordinator { background: var(--purple-alpha); color: var(--purple); border: 1px solid rgba(139,92,246,0.2); }
    .role-admin { background: var(--danger-alpha); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

    .tag {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
      margin: 2px;
    }

    /* Avatar */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.85rem;
      color: white;
      flex-shrink: 0;
      user-select: none;
      border: 2px solid var(--bg2);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .avatar.sm { width: 28px; height: 28px; border-radius: 8px; font-size: 0.7rem; border-width: 1px; }
    .avatar.lg { width: 52px; height: 52px; border-radius: 14px; font-size: 1.2rem; }

    /* Tables */
    .table-wrap {
      overflow-x: auto;
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    th {
      padding: 1rem 1.25rem;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
    }

    td {
      padding: 1rem 1.25rem;
      font-size: 0.9rem;
      color: var(--text2);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tbody tr {
      transition: background-color 0.2s ease;
    }

    tbody tr:hover {
      background-color: var(--surface);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr[style*="cursor: pointer"]:hover td {
      color: var(--text);
    }

    /* Progress & Rubrics */
    .progress-wrap {
      background: var(--surface2);
      border-radius: var(--radius-full);
      overflow: hidden;
      width: 100%;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
    }

    .progress-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: linear-gradient(90deg, var(--accent3), var(--cyan));
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: 0; right: 0;
      background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
      animation: shimmer 2.5s infinite linear;
      background-size: 200% 100%;
    }

    /* Range Input Customization for Rubric */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: var(--cyan);
      cursor: pointer;
      margin-top: -8px;
      box-shadow: 0 2px 6px rgba(6, 182, 212, 0.4);
      border: 2px solid var(--bg2);
    }

    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      background: var(--surface2);
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    input[type=range]:focus { outline: none; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      padding: 0.75rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .tab-btn:hover {
      color: var(--text);
      background: var(--surface);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    }

    .tab-btn.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
      background: var(--cyan-alpha);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 23, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
    }

    .modal-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.01);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }

    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
    }

    .modal-footer {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      background: var(--surface);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }

    /* Toasts */
    #toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      pointer-events: none;
    }

    .toast {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      box-shadow: var(--shadow-lg);
      min-width: 300px;
      max-width: 400px;
      pointer-events: auto;
    }

    .toast-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    .toast.success { border-left: 4px solid var(--green); }

    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ============================================================================
    // UTILITIES & API
    // ============================================================================
    const API_BASE = '/api';

    const api = {
      token: () => localStorage.getItem('token'),
      headers: () => ({ 
        'Content-Type': 'application/json', 
        ...(api.token() ? {'Authorization': `Token ${api.token()}`} : {}) 
      }),
      async request(method, url, body = null, isFormData = false) {
        const headers = isFormData 
          ? { 'Authorization': `Token ${api.token()}` } // Browser sets content-type for FormData automatically
          : api.headers();
          
        const config = { method, headers };
        if (body) config.body = isFormData ? body : JSON.stringify(body);

        try {
          const res = await fetch(API_BASE + url, config);
          if (!res.ok) {
            let errorData = {};
            try { errorData = await res.json(); } catch(e) {}
            throw { status: res.status, data: errorData };
          }
          if (res.status === 204) return null;
          return await res.json();
        } catch (err) {
          // Network errors or thrown status errors
          throw err;
        }
      },
      get: (url) => api.request('GET', url),
      post: (url, body, isForm = false) => api.request('POST', url, body, isForm),
      patch: (url, body) => api.request('PATCH', url, body),
      delete: (url) => api.request('DELETE', url),
    };

    const formatDate = (dateString) => {
      if (!dateString) return '—';
      const options = { day: 'numeric', month: 'short', year: 'numeric' };
      return new Date(dateString).toLocaleDateString('en-NG', options);
    };

    const formatRelativeTime = (dateString) => {
      if (!dateString) return '';
      const diff = Date.now() - new Date(dateString).getTime();
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);
      
      if (minutes < 1) return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days === 1) return 'Yesterday';
      if (days < 7) return `${days}d ago`;
      return formatDate(dateString);
    };

    const triggerToast = (message, type = 'info') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      let iconSvg = '';
      if (type === 'success') iconSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
      else if (type === 'error') iconSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
      else iconSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>';

      toast.innerHTML = `
        <div class="toast-icon">${iconSvg}</div>
        <div style="flex:1; padding-top: 2px;">${message}</div>
      `;
      
      container.appendChild(toast);
      
      // Trigger animation removal
      setTimeout(() => {
        toast.style.animation = 'fadeOut 0.3s ease forwards';
        setTimeout(() => {
          if (toast.parentNode === container) container.removeChild(toast);
        }, 300);
      }, 4000);
    };

        projects: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>,

    // --- AUTHENTICATION PAGE ---
    const AuthPage = ({ onLoginSuccess, onNavigateBack }) => {

      const handleSubmit = async (e) => {
        if (e) e.preventDefault();
        setLoading(true);
        setError('');
        
        try {
          const endpoint = isLogin ? '/auth/login/' : '/auth/register/';
          const payload = isLogin ? { username: form.username, password: form.password } : form;
          
          const response = await api.post(endpoint, payload);
          
          // Success
          localStorage.setItem('token', response.token);
          triggerToast(`Authentication successful. Welcome, ${response.user.first_name || response.user.username}.`, 'success');
          onLoginSuccess(response.user);
          
        } catch (err) {
          console.error("Auth Error:", err);
          let errMsg = 'Connection refused. Please ensure the server is running.';
          if (err.data && err.data.message) errMsg = err.data.message;
          else if (err.status === 401) errMsg = 'Invalid credentials provided.';
          else if (err.status === 400) errMsg = 'Username or email already in use.';
          setError(errMsg);
        } finally {
          setLoading(false);
        }

    // --- PROJECTS DIRECTORY VIEW ---
    const ProjectsView = ({ user, navigateTo }) => {
      const [data, setData] = useState({ results: [], total: 0, pages: 1, current_page: 1 });
      const [loading, setLoading] = useState(true);
      
      const [search, setSearch] = useState('');
      const [statusFilter, setStatusFilter] = useState('');
      
      // Modal State
      const [showModal, setShowModal] = useState(false);
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({ title: '', abstract: '', session: '2023/2024', topic_id: '', supervisor_id: '', keywords: '', tools_used: '' });
      
      // Lookups
      const [supervisors, setSupervisors] = useState([]);
      const [topics, setTopics] = useState([]);

      const isAdminOrCoord = ['admin', 'coordinator'].includes(user.role);

      const fetchProjects = useCallback(async (page = 1) => {
        setLoading(true);
        try {
          let url = `/projects/?page=${page}`;
          if (search) url += `&search=${encodeURIComponent(search)}`;
          if (statusFilter) url += `&status=${encodeURIComponent(statusFilter)}`;
          
          const res = await api.get(url);
          setData(res);
        } catch (e) {
          triggerToast('Failed to fetch registry data.', 'error');
        } finally {
          setLoading(false);
        }
      }, [search, statusFilter]);

      useEffect(() => {
        const delayDebounceFn = setTimeout(() => { fetchProjects(1); }, 400);
        return () => clearTimeout(delayDebounceFn);
      }, [search, statusFilter, fetchProjects]);

      useEffect(() => {
        if (isAdminOrCoord) {
          api.get('/auth/users/?role=supervisor').then(res => setSupervisors(res.results || res));
          api.get('/topics/').then(res => setTopics(res.results || res));
        }
      }, [isAdminOrCoord]);

      const handleCreate = async () => {
        if (!form.title) return triggerToast('Title is required', 'error');
        setSaving(true);
        try {
          await api.post('/projects/', form);
          triggerToast('Project successfully initialized in registry.', 'success');
          setShowModal(false);
          setForm({ title: '', abstract: '', session: '2023/2024', topic_id: '', supervisor_id: '', keywords: '', tools_used: '' });
          fetchProjects(1);
        } catch (e) {
          triggerToast('Initialization failed.', 'error');
        } finally {
          setSaving(false);
        }

      return (
        <div className="page-container fade-in">

            <div>

              <p className="text-muted mt-1">Showing {data.total} records</p>
            </div>
            {isAdminOrCoord && (
              <button className="btn btn-primary" onClick={() => setShowModal(true)}>
                <Icon name="plus" size={16} /> Initialize Record
              </button>
            )}
          </div>

          <div className="flex gap-4 mb-6 flex-wrap">
            <div className="search-bar" style={{ flex: '1 1 300px' }}>
              <Icon name="search" size={16} className="text-muted" />
              <input placeholder="Query by title, candidate name, or matric..." value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            <select className="form-select" style={{ width: '200px', flexShrink: 0 }} value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
              <option value="">All Statuses</option>
              <option value="proposal">Proposal</option>
              <option value="approved">Approved</option>
              <option value="in_progress">In Progress</option>
              <option value="submitted">Submitted</option>
              <option value="revision">Revision Needed</option>
              <option value="completed">Completed</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>

          {loading ? (
            <SkeletonLoader height="400px" />
          ) : data.results.length === 0 ? (
            <div className="empty-state">
              <Icon name="search" size={48} />
              <h3 className="mt-4">No Records Found</h3>
              <p className="text-sm">Adjust your query parameters.</p>
            </div>
          ) : (
            <div className="card">
              <div className="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Candidate</th>
                      <th>Research Title</th>
                      <th>Supervisor</th>
                      <th>Session</th>
                      <th>Status</th>
                      <th>Evaluation</th>
                    </tr>
                  </thead>
                  <tbody>
                    {data.results.map(p => (
                      <tr key={p.id} onClick={() => navigateTo('project-detail', p.id)} style={{ cursor: 'pointer' }}>
                        <td>
                          <div className="flex items-center gap-3">
                            <Avatar initials={p.student_avatar} size="sm" seed={p.student_matric} />
                            <div>
                              <div className="font-semibold text-sm text-text">{p.student_name}</div>
                              <div className="text-xs text-muted font-mono mt-1">{p.student_matric}</div>
                            </div>
                          </div>
                        </td>
                        <td style={{ maxWidth: 300 }}>
                          <div className="font-medium text-sm text-text truncate" style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.title}</div>
                          {p.keywords && (
                            <div className="flex gap-2 mt-2 flex-wrap">
                              {p.keywords.split(',').slice(0,2).map((k,i) => <span key={i} className="tag text-xs" style={{ padding: '0.1rem 0.4rem' }}>{k.trim()}</span>)}
                            </div>
                          )}
                        </td>
                        <td className="text-sm text-muted">{p.supervisor_name || <span className="italic">Unassigned</span>}</td>
                        <td className="text-sm font-mono text-muted">{p.session || '—'}</td>
                        <td><StatusBadge status={p.status} /></td>
                        <td>
                          {p.grade_letter ? (
                            <div className="flex items-center gap-2">
                              <span className="font-bold" style={{ color: p.grade_letter === 'A' ? 'var(--green)' : p.grade_letter === 'F' ? 'var(--red)' : 'var(--text)' }}>{p.grade_letter}</span>
                              <span className="text-xs text-muted">({p.total_score})</span>
                            </div>
                          ) : (
                            <div className="flex flex-col gap-1 w-full" style={{ maxWidth: 100 }}>
                              <ProgressBarUI percent={p.progress_percent} height={4} />
                              <span className="text-xs text-muted text-right">{p.progress_percent}%</span>
                            </div>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              
              {/* Pagination */}
              <div className="p-4 border-t border-border" style={{ borderTop: '1px solid var(--border)', padding: '1rem' }}>
                <PaginationControl current={data.current_page} total={data.pages} onPageChange={fetchProjects} />
              </div>
            </div>
          )}

          {/* Init Modal */}
          {showModal && (
            <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowModal(false)}>
              <div className="modal fade-in">
                <div className="modal-header">
                  <span className="modal-title">Initialize Research Record</span>
                  <button className="icon-btn" style={{ width: 32, height: 32, border: 'none', background: 'transparent' }} onClick={() => setShowModal(false)}><Icon name="x" size={18}/></button>
                </div>
                <div className="modal-body">
                  <div className="form-group">
                    <label className="form-label">Research Title <span className="text-red">*</span></label>
                    <input className="form-input" placeholder="e.g. Distributed Ledger for Academic Records" value={form.title} onChange={e => setForm({...form, title: e.target.value})} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Abstract / Summary</label>
                    <textarea className="form-textarea" placeholder="Brief overview of the research aims..." value={form.abstract} onChange={e => setForm({...form, abstract: e.target.value})}></textarea>
                  </div>
                  <div className="grid-2 mb-4">
                    <div className="form-group mb-0">
                      <label className="form-label">Academic Session</label>
                      <select className="form-select" value={form.session} onChange={e => setForm({...form, session: e.target.value})}>
                        <option value="2024/2025">2024/2025</option>
                        <option value="2023/2024">2023/2024</option>
                        <option value="2022/2023">2022/2023</option>
                      </select>
                    </div>
                    <div className="form-group mb-0">
                      <label className="form-label">Link to Topic</label>
                      <select className="form-select" value={form.topic_id} onChange={e => setForm({...form, topic_id: e.target.value})}>
                        <option value="">Independent Topic</option>
                        {topics.map(t => <option key={t.id} value={t.id}>{t.title}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="form-group">
                    <label className="form-label">Assign Supervisor</label>
                    <select className="form-select" value={form.supervisor_id} onChange={e => setForm({...form, supervisor_id: e.target.value})}>
                      <option value="">Pending Assignment</option>
                      {supervisors.map(s => <option key={s.id} value={s.id}>{s.full_name}</option>)}
                    </select>
                  </div>
                  <div className="grid-2 mb-0">
                    <div className="form-group mb-0">
                      <label className="form-label">Keywords (Comma separated)</label>
                      <input className="form-input" placeholder="AI, Blockchain, IoT" value={form.keywords} onChange={e => setForm({...form, keywords: e.target.value})} />

                    <div className="form-group mb-0">
                      <label className="form-label">Tech Stack</label>
                      <input className="form-input" placeholder="Python, React, Postgres" value={form.tools_used} onChange={e => setForm({...form, tools_used: e.target.value})} />

                <div className="modal-footer">
                  <button className="btn btn-secondary" onClick={() => setShowModal(false)}>Abort</button>
                  <button className="btn btn-primary" onClick={handleCreate} disabled={saving || !form.title}>
                    {saving ? <span className="spinner spinner-sm"></span> : 'Commit Record'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- PROJECT DETAIL WORKSPACE ---
    const ProjectDetailView = ({ projectId, user, navigateTo }) => {
      const [project, setProject] = useState(null);
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState('overview');
      
      // Permissions
      const isAdminOrCoord = ['admin', 'coordinator'].includes(user.role);
      const isSupervisor = user.role === 'supervisor';
      const canEdit = isAdminOrCoord || isSupervisor;
      
      // State for interactions
      const [status, setStatus] = useState('');
      const [rubric, setRubric] = useState({ rubric_code: 0, rubric_docs: 0, rubric_presentation: 0 });
      const [comment, setComment] = useState('');
      const [sendingComment, setSendingComment] = useState(false);
      
      const [showMilestoneModal, setShowMilestoneModal] = useState(false);
      const [milestoneForm, setMilestoneForm] = useState({ title: '', description: '', due_date: '', status: 'pending' });

      const loadProject = useCallback(async () => {
        try {
          const res = await api.get(`/projects/${projectId}/`);
          setProject(res);
          setStatus(res.status);
          setRubric({ rubric_code: res.rubric_code, rubric_docs: res.rubric_docs, rubric_presentation: res.rubric_presentation });
        } catch (e) {
          triggerToast('Failed to load workspace.', 'error');
          navigateTo('projects');
        } finally {
          setLoading(false);
        }
      }, [projectId, navigateTo]);

      useEffect(() => { loadProject(); }, [loadProject]);

      // WebSocket listener for real-time updates specific to this project
      useEffect(() => {
        if (!project || !user) return;
        const socket = io(window.location.origin);
        socket.on('connect', () => { socket.emit('authenticate', { token: api.token() }); });
        
        socket.on('new_notification', (n) => {
          // If the notification is about a comment, refresh to show it
          if (n.title === 'New Comment' || n.title === 'Project Graded') {
             loadProject();
          }
        });
        return () => socket.disconnect();
      }, [project?.id, user]);

      const handleUpdateStatus = async (newStatus) => {
        setStatus(newStatus);
        try {
          await api.patch(`/projects/${projectId}/`, { status: newStatus });
          triggerToast('State mutated successfully.', 'success');
          loadProject();
        } catch { triggerToast('State mutation failed.', 'error'); }
      };

      const handleSaveRubric = async () => {
        try {
          await api.patch(`/projects/${projectId}/`, rubric);
          triggerToast('Evaluation rubric committed.', 'success');
          loadProject();
        } catch { triggerToast('Evaluation commit failed.', 'error'); }
      };

      const handlePostComment = async () => {
        if (!comment.trim()) return;
        setSendingComment(true);
        try {
          await api.post(`/projects/${projectId}/comments/`, { content: comment, is_feedback: canEdit });
          setComment('');
          loadProject();
        } catch { triggerToast('Failed to transmit message.', 'error'); }
        finally { setSendingComment(false); }
      };

      const handleAddMilestone = async () => {
        if (!milestoneForm.title) return;
        try {
          await api.post(`/projects/${projectId}/milestones/`, milestoneForm);
          setShowMilestoneModal(false);
          setMilestoneForm({ title: '', description: '', due_date: '', status: 'pending' });
          loadProject();
          triggerToast('Timeline objective inserted.', 'success');
        } catch { triggerToast('Failed to insert objective.', 'error'); }
      };

      const handleUpdateMilestone = async (mId, mStatus) => {
        try {
          await api.patch(`/projects/${projectId}/milestones/${mId}/`, { status: mStatus });
          loadProject();
        } catch { triggerToast('Failed to update objective.', 'error'); }
      };

      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const fd = new FormData();
        fd.append('file', file);
        fd.append('title', file.name);
        fd.append('doc_type', file.name.split('.').pop().toUpperCase() || 'DOCUMENT');
        
        triggerToast('Uploading sequence initiated...', 'info');
        try {
          await api.post(`/projects/${projectId}/documents/`, fd, true);
          triggerToast('File transmitted and stored successfully.', 'success');
          loadProject();
        } catch { triggerToast('Transmission failed.', 'error'); }
        e.target.value = '';
      };

      if (loading) return (
        <div className="page-container">
          <SkeletonLoader height="120px" mb="24px" />
          <SkeletonLoader height="60px" mb="24px" />
          <SkeletonLoader height="300px" />
        </div>
      );
      if (!project) return null;

      const progress = project.progress_percent || 0;

      return (
        <div className="page-container fade-in">
          {/* Header Area */}
          <div className="mb-6">
            <button className="btn btn-ghost btn-sm mb-4" onClick={() => navigateTo('projects')} style={{ paddingLeft: 0 }}>
              <Icon name="chevron_left" size={16} /> Back to Registry
            </button>
            
            <div className="flex items-start justify-between gap-6 flex-wrap">
              <div style={{ flex: 1, minWidth: 300 }}>
                <div className="flex items-center gap-3 mb-3 flex-wrap">
                  <StatusBadge status={project.status} />
                  <span className="tag font-mono">{project.session}</span>
                  {project.grade_letter && (
                    <span className="tag" style={{ background: 'var(--green-alpha)', color: 'var(--green)', borderColor: 'rgba(16,185,129,0.2)' }}>
                      Final Grade: {project.grade_letter}
                    </span>
                  )}
                </div>
                <h1 className="heading-1" style={{ fontSize: '2rem' }}>{project.title}</h1>
              </div>
              
              {canEdit && (
                <div className="flex items-center gap-3 bg-surface p-2 rounded-lg border border-border" style={{ background: 'var(--surface)', padding: '0.5rem', borderRadius: var(--radius-sm), border: '1px solid var(--border)' }}>
                  <span className="text-xs font-bold text-muted uppercase">State Mutator:</span>
                  <select className="form-select btn-sm" style={{ width: 160, padding: '0.4rem 2rem 0.4rem 0.8rem', margin: 0 }} value={status} onChange={e => handleUpdateStatus(e.target.value)}>
                    <option value="proposal">Proposal</option>
                    <option value="approved">Approved</option>
                    <option value="in_progress">In Progress</option>
                    <option value="submitted">Submitted</option>
                    <option value="revision">Revision Needed</option>
                    <option value="completed">Completed</option>
                    <option value="rejected">Rejected</option>
                  </select>
                </div>
              )}
            </div>
          </div>

          {/* Top Metrics Bar */}
          <div className="grid-3 mb-6" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))' }}>
            {[
              { l: 'Candidate', v: project.student.full_name, s: project.student.matric_number },
              { l: 'Supervisor', v: project.supervisor ? project.supervisor.full_name : 'Unassigned', s: project.supervisor ? project.supervisor.email : '' },
              { l: 'Target Deadline', v: formatDate(project.deadline), s: 'Final Submission' }
            ].map((m, i) => (
              <div key={i} className="card p-4" style={{ padding: '1rem 1.25rem' }}>
                <div className="text-xs font-bold text-muted uppercase tracking-wider mb-1">{m.l}</div>
                <div className="font-semibold text-text text-lg">{m.v}</div>
                <div className="text-xs text-muted font-mono mt-1">{m.s}</div>
              </div>
            ))}
            
            <div className="card p-4 flex-col justify-center" style={{ padding: '1rem 1.25rem', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
              <div className="flex justify-between items-end mb-2">
                <div className="text-xs font-bold text-muted uppercase tracking-wider">Completion</div>
                <div className="font-bold text-cyan">{progress}%</div>
              </div>
              <ProgressBarUI percent={progress} height={8} />
              <div className="text-xs text-muted mt-2 text-right">{project.completed_milestones} of {project.milestone_count} objectives met</div>
            </div>
          </div>

          {/* Navigation Tabs */}
          <div className="tabs">
            {['overview', 'milestones', 'evaluation', 'discussion', 'repository'].map(t => (
              <button key={t} className={`tab-btn ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>
                {t.charAt(0).toUpperCase() + t.slice(1)}
                {t === 'discussion' && project.comments?.length > 0 ? ` (${project.comments.length})` : ''}
                {t === 'repository' && project.documents?.length > 0 ? ` (${project.documents.length})` : ''}
              </button>
            ))}
          </div>

          {/* TAB: OVERVIEW */}
          {tab === 'overview' && (
            <div className="grid-2 fade-in" style={{ gridTemplateColumns: '2fr 1fr' }}>
              <div className="flex-col gap-6" style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
                <div className="card">
                  <div className="card-header"><span className="card-title">Abstract & Synopsis</span></div>

            </div>

    // --- PEOPLE DIRECTORY VIEW ---
    const UsersView = () => {
      const [data, setData] = useState({ results: [], total: 0, pages: 1, current_page: 1 });
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [roleFilter, setRoleFilter] = useState('');

      const fetchUsers = useCallback(async (page = 1) => {
        setLoading(true);
        try {
          let url = `/auth/users/?page=${page}`;
          if (search) url += `&search=${encodeURIComponent(search)}`;
          if (roleFilter) url += `&role=${encodeURIComponent(roleFilter)}`;
          const res = await api.get(url);
          setData(res);
        } catch (e) {
          triggerToast('Failed to fetch personnel directory.', 'error');
        } finally {
          setLoading(false);
        }
      }, [search, roleFilter]);

      useEffect(() => {
        const delayDebounceFn = setTimeout(() => { fetchUsers(1); }, 300);
        return () => clearTimeout(delayDebounceFn);
      }, [search, roleFilter, fetchUsers]);

      return (
        <div className="page-container fade-in">
          <div className="flex items-center justify-between mb-6 flex-wrap gap-4">
            <div>
              <h1 className="heading-1" style={{ fontSize: '1.8rem' }}>Personnel Directory</h1>
              <p className="text-muted mt-1">Found {data.total} registered identities.</p>

          </div>

            <div className="search-bar" style={{ flex: '1 1 300px' }}>

            </div>
            <select className="form-select" style={{ width: '200px', flexShrink: 0 }} value={roleFilter} onChange={e => setRoleFilter(e.target.value)}>
              <option value="">All Clearances</option>

              <option value="supervisor">Supervisors</option>
              <option value="coordinator">Coordinators</option>
              <option value="admin">Administrators</option>
            </select>
          </div>

          {loading ? (
            <div className="grid-3">
              {[1,2,3,4,5,6].map(i => <SkeletonLoader key={i} height="120px" />)}
            </div>
          ) : data.results.length === 0 ? (
            <div className="empty-state">
              <Icon name="users" size={48} />
              <h3 className="mt-4">No Identities Found</h3>
            </div>
          ) : (
            <>
              <div className="grid-3" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: '1rem' }}>
                {data.results.map(u => (
                  <div key={u.id} className="card p-4 flex gap-4 items-start" style={{ padding: '1.25rem', display: 'flex', gap: '1rem', alignItems: 'flex-start', background: 'var(--surface)', transition: 'transform 0.2s', cursor: 'default' }} onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}>
                    <Avatar initials={u.avatar_initials} size="lg" seed={u.username} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div className="font-bold text-text text-base truncate" style={{ fontSize: '1.05rem', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{u.full_name}</div>
                      <div className="text-xs text-muted truncate mt-1" style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{u.email}</div>
                      <div className="flex items-center gap-2 mt-3 flex-wrap">
                        <RoleBadge role={u.role} />
                        {u.level && <span className="tag text-xs" style={{ padding: '0.1rem 0.4rem', fontSize: '0.65rem' }}>{u.level}</span>}
                      </div>
                      {u.matric_number && (
                        <div className="mt-3 text-xs font-mono bg-bg2 px-2 py-1 rounded border border-border inline-block" style={{ marginTop: '0.75rem', fontSize: '0.7rem', fontFamily: 'monospace', background: 'var(--bg2)', padding: '4px 8px', borderRadius: 6, border: '1px solid var(--border)', display: 'inline-block' }}>
                          ID: {u.matric_number}
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
              <PaginationControl current={data.current_page} total={data.pages} onPageChange={fetchUsers} />
            </>
          )}
        </div>
      );
    };

    // --- TOPICS VIEW ---
    const TopicsView = ({ user }) => {
      const [topics, setTopics] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [form, setForm] = useState({ title: '', description: '' });

      const load = useCallback(() => {
        setLoading(true);
        api.get('/topics/').then(res => setTopics(res.results || res)).finally(()=>setLoading(false));
      }, []);

      useEffect(() => { load(); }, [load]);

      const handleCreate = async () => {
        try {
          await api.post('/topics/', form);
          triggerToast('Topic proposal accepted.', 'success');

          load();

              <Icon name="plus" size={16} /> Propose Topic
            </button>

            <div className="grid-2"><SkeletonLoader height="150px"/><SkeletonLoader height="150px"/></div>

                    Registered: {formatDate(t.created_at)}
                  </div>
                </div>
              ))}
            </div>
          )}

          {showModal && (
            <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowModal(false)}>
              <div className="modal fade-in">
                <div className="modal-header">
                  <span className="modal-title">Propose Research Topic</span>

    // --- ANNOUNCEMENTS VIEW ---

                  <div className="form-group">
                    <label className="form-label">Header <span className="text-red">*</span></label>
                    <input className="form-input" placeholder="Attention all candidates..." value={form.title} onChange={e => setForm({...form, title: e.target.value})} />

                    <label className="form-label">Payload <span className="text-red">*</span></label>

                        <input type="checkbox" checked={form.is_pinned} onChange={e => setForm({...form, is_pinned: e.target.checked})} style={{ width: 18, height: 18, accentColor: 'var(--cyan)' }} />

    // --- NOTIFICATIONS VIEW ---
    const NotificationsView = () => {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        api.get('/notifications/').then(res => setItems(res.results || res)).finally(()=>setLoading(false));
      }, []);

      const handleMarkRead = async () => {
        try {
          await api.post('/notifications/read/', {});

        } catch {}

      return (
        <div className="page-container fade-in" style={{ maxWidth: 800, margin: '0 auto' }}>

              <Icon name="check" size={16} /> Acknowledge All

          {loading ? (
             <div className="flex-col gap-3"><SkeletonLoader height="80px"/><SkeletonLoader height="80px"/></div>
          ) : items.length === 0 ? (

                {items.map(n => (
                  <div key={n.id} className="notif-item" style={{ padding: '1.25rem 1.5rem', borderBottom: '1px solid var(--border)', display: 'flex', gap: '1rem', background: n.is_read ? 'transparent' : 'var(--accent-alpha)', transition: 'background 0.2s' }}>
                    <div style={{ width: 40, height: 40, borderRadius: 12, background: 'var(--surface2)', color: 'var(--text2)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, border: '1px solid var(--border)' }}>

                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- ANALYTICS VIEW ---
    const AnalyticsView = () => {
      const [stats, setStats] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => { api.get('/stats/').then(setStats).finally(()=>setLoading(false)); }, []);

      if (loading) return <div className="page-container"><SkeletonLoader height="120px" mb="20px"/><SkeletonLoader height="400px"/></div>;
      if (!stats) return <div className="page-container"><div className="empty-state">Failed to load telemetry.</div></div>;

      const colors = { proposal:'var(--text3)', approved:'var(--cyan)', in_progress:'var(--accent)', submitted:'var(--purple)', revision:'var(--yellow)', completed:'var(--green)', rejected:'var(--red)' };
      const total = stats.total || 1;

      return (
        <div className="page-container fade-in">
          <h1 className="heading-1 mb-6" style={{ fontSize: '1.8rem' }}>Ecosystem Telemetry</h1>

          <div className="stat-grid mb-8">
            {[
              {label:'Total Active Projects', val:stats.total, color:'blue', icon:'projects'},
              {label:'Total Enrolled Candidates', val:stats.total_students, color:'cyan', icon:'users'},
              {label:'Faculty Supervisors', val:stats.total_supervisors, color:'purple', icon:'profile'},
              {label:'Successfully Defended', val:stats.by_status?.completed?.count||0, color:'green', icon:'check'},
            ].map((s,i) => (
              <div key={i} className={`card p-5`} style={{ padding: '1.5rem', display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden' }}>
                <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: `var(--${s.color==='blue'?'accent':s.color==='cyan'?'cyan':s.color==='green'?'green':'purple'})` }}></div>
                <div className="text-xs font-bold text-muted uppercase tracking-wider mb-2">{s.label}</div>
                <div className="heading-1" style={{ fontSize: '2.5rem' }}>{s.val}</div>
                <div style={{ position: 'absolute', right: 20, top: 24, color: `var(--${s.color==='blue'?'accent':s.color==='cyan'?'cyan':s.color==='green'?'green':'purple'})`, opacity: 0.2 }}>
                  <Icon name={s.icon} size={48} />
                </div>
              </div>
            ))}
          </div>

          <div className="grid-2">
            <div className="card">
              <div className="card-header"><span className="card-title">Distribution by Status Node</span></div>
              <div className="card-body">
                {Object.entries(stats.by_status || {}).map(([key, info]) => (
                  <div key={key} className="mb-4" style={{ marginBottom: '1.25rem' }}>
                    <div className="flex justify-between mb-2 text-sm font-semibold text-text">
                      <div className="flex items-center gap-2">
                        <div style={{ width: 12, height: 12, borderRadius: '50%', background: colors[key] || 'var(--text3)' }}></div>
                        {info.label}
                      </div>
                      <span>{info.count} <span className="text-muted font-normal text-xs ml-1">({Math.round((info.count/total)*100)}%)</span></span>
                    </div>
                    <div style={{ height: 6, background: 'var(--surface2)', borderRadius: 99, overflow: 'hidden' }}>
                      <div style={{ height: '100%', width: `${(info.count/total)*100}%`, background: colors[key] || 'var(--text3)', transition: 'width 1s cubic-bezier(0.16, 1, 0.3, 1)' }}></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="card" style={{ height: 'fit-content' }}>
              <div className="card-header"><span className="card-title">Academic Session Nodes</span></div>
              <div className="card-body flex-col gap-3" style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                {stats.sessions?.length > 0 ? stats.sessions.filter(Boolean).map(s => (
                  <div key={s} className="flex justify-between items-center p-3 rounded-lg bg-surface border border-border" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.75rem 1rem', background: 'var(--surface)', borderRadius: var(--radius-sm), border: '1px solid var(--border)' }}>
                    <span className="font-mono font-bold text-text" style={{ fontSize: '1.1rem' }}>{s}</span>
                    <span className="tag">Active Node</span>
                  </div>
                )) : <div className="empty-state p-6"><p>No session nodes established.</p></div>}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- PROFILE VIEW ---
    const ProfileView = ({ user, onUpdateUser }) => {
      const [form, setForm] = useState({ ...user });
      const [saving, setSaving] = useState(false);

      const handleSave = async () => {
        setSaving(true);
        try {
          const updated = await api.patch('/auth/profile/', form);
          onUpdateUser(updated);
          triggerToast('Identity parameters updated.', 'success');
        } catch { triggerToast('Failed to update parameters.', 'error'); }
        finally { setSaving(false); }
      };

      return (
        <div className="page-container fade-in" style={{ maxWidth: 1000, margin: '0 auto' }}>
          <h1 className="heading-1 mb-6" style={{ fontSize: '1.8rem' }}>Identity & Clearance</h1>
          
          <div className="grid-2" style={{ gridTemplateColumns: '2fr 1fr' }}>
            <div className="card">
              <div className="card-header"><span className="card-title">Mutable Parameters</span></div>
              <div className="card-body">
                <div className="flex items-center gap-6 mb-8 p-4 rounded-xl bg-surface border border-border" style={{ display: 'flex', alignItems: 'center', gap: '1.5rem', marginBottom: '2rem', padding: '1rem', background: 'var(--surface)', borderRadius: var(--radius), border: '1px solid var(--border)' }}>
                  <Avatar initials={form.avatar_initials} size="lg" seed={form.username} />
                  <div>
                    <h2 className="heading-3 mb-1">{form.first_name} {form.last_name}</h2>
                    <p className="text-sm text-muted font-mono">{form.email}</p>
                    <div className="mt-2"><RoleBadge role={form.role} /></div>
                  </div>
                </div>

                <div className="grid-2 mb-0">
                  <div className="form-group">
                    <label className="form-label">Given Name</label>
                    <input className="form-input" value={form.first_name} onChange={e=>setForm({...form, first_name:e.target.value})} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Surname</label>
                    <input className="form-input" value={form.last_name} onChange={e=>setForm({...form, last_name:e.target.value})} />
                  </div>
                </div>
                
                <div className="grid-2 mb-0">
                  <div className="form-group">
                    <label className="form-label">Comm Channel (Email)</label>
                    <input type="email" className="form-input" value={form.email} onChange={e=>setForm({...form, email:e.target.value})} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Comm Channel (Phone)</label>
                    <input className="form-input" placeholder="+234..." value={form.phone || ''} onChange={e=>setForm({...form, phone:e.target.value})} />
                  </div>
                </div>

                <div className="form-group mb-6">
                  <label className="form-label">Academic Biography</label>
                  <textarea className="form-textarea" placeholder="Input professional summary..." value={form.bio || ''} onChange={e=>setForm({...form, bio:e.target.value})}></textarea>
                </div>

                <button className="btn btn-primary btn-lg w-full" onClick={handleSave} disabled={saving}>
                  {saving ? <span className="spinner spinner-sm"></span> : 'Commit Changes to Ledger'}
                </button>
              </div>
            </div>

            <div className="card" style={{ height: 'fit-content' }}>
              <div className="card-header"><span className="card-title">Immutable State</span></div>
              <div className="card-body">
                <p className="text-xs text-muted mb-4">These parameters are locked by the central coordinator and cannot be mutated by the user.</p>
                <div className="flex-col gap-3" style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                  {[
                    ['System ID', user.username],
                    ['Clearance', user.role],
                    ['Department', user.department],
                    ['Matriculation', user.matric_number || '—'],
                    ['Level Node', user.level || '—'],
                    ['Session Node', user.session || '—'],
                    ['Init Date', formatDate(user.date_joined)]
                  ].map(([k, v]) => (
                    <div key={k} className="flex justify-between items-center py-2 border-b border-border" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.5rem 0', borderBottom: '1px solid var(--border)' }}>
                      <span className="text-xs font-bold text-muted uppercase tracking-wider">{k}</span>
                      <span className="text-sm font-semibold text-text font-mono text-right">{v}</span>

                  ))}

              </div>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================================
    // MAIN APP SHELL COMPONENT
    // ============================================================================
    const App = () => {
      // Core State
      const [user, setUser] = useState(null);
      const [ready, setReady] = useState(false);
      const [view, setView] = useState('landing'); // 'landing', 'auth', 'app'
      const [page, setPage] = useState('dashboard');
      const [pageParam, setPageParam] = useState(null);
      
      // Theme State
      const [theme, setTheme] = useState(localStorage.getItem('theme') || 'dark');
      
      // Global Notification State
      const [unreadCount, setUnreadCount] = useState(0);
      const [showNotifPanel, setShowNotifPanel] = useState(false);
      const [notifications, setNotifications] = useState([]);
      const notifRef = useRef(null);

      // 1. Synchronize Theme with DOM
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
      }, [theme]);

      // 2. Initial Boot Sequence (Check Token)
      useEffect(() => {
        if (api.token()) {
          api.get('/auth/profile/')
             .then(u => { setUser(u); setView('app'); })
             .catch(() => localStorage.removeItem('token'))
             .finally(() => setTimeout(() => setReady(true), 800));
        } else {
          setTimeout(() => setReady(true), 800);
        }
      }, []);

      // 3. WebSocket & Notification Sync (Runs when user is logged in)
      useEffect(() => {
        if (!user) return;
        
        // Initial Fetch
        api.get('/notifications/').then(res => {
          const items = res.results || res;
          setNotifications(items.slice(0, 10));
          setUnreadCount(items.filter(n => !n.is_read).length);
        }).catch(err => console.error("Notif fetch error", err));

        // Connect Socket.IO
        const socket = io(window.location.origin);
        socket.on('connect', () => { 
          socket.emit('authenticate', { token: api.token() }); 
        });
        
        socket.on('new_notification', (n) => {
          setNotifications(prev => [n, ...prev].slice(0, 10));
          setUnreadCount(c => c + 1);
          triggerToast(n.title, 'info'); // Dynamic pop-up!
        });

        return () => socket.disconnect();
      }, [user]);

      // 4. Click-outside listener for Notification Dropdown
      useEffect(() => {
        const handler = (e) => {
          if (notifRef.current && !notifRef.current.contains(e.target)) {
            setShowNotifPanel(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      // Action Handlers
      const navigateTo = (p, param = null) => { 
        setPage(p); 
        setPageParam(param); 
        setShowNotifPanel(false); 
      };

      const handleLogout = async () => {
        try { await api.post('/auth/logout/'); } catch (e) {}
        localStorage.removeItem('token');
        setUser(null);
        setPage('dashboard');
        setView('landing');
        triggerToast('Session terminated.', 'info');
      };

      const markAllRead = () => {
        api.post('/notifications/read/', {}).then(() => {
          setUnreadCount(0);
          setNotifications(prev => prev.map(x => ({...x, is_read: true})));
        });
      };

      // Remove loading screen from DOM once ready
      useEffect(() => {
        if (ready) {
          const ls = document.getElementById('loading-screen');
          if (ls) { 
            ls.style.opacity = '0'; 
            setTimeout(() => ls.remove(), 400); 
          }
        }
      }, [ready]);

      // --- RENDER ROUTING ---
      if (!ready) return null; // App stays hidden until loading screen fades
      
      if (!user) {
        if (view === 'landing') return <LandingPage onNavigateToAuth={() => setView('auth')} />;
        if (view === 'auth') return <AuthPage onLoginSuccess={u => { setUser(u); setView('app'); }} onNavigateBack={() => setView('landing')} />;
      }

      // Main App Shell Render
      const pageTitles = { dashboard: 'System Dashboard', projects: 'Research Registry', 'project-detail': 'Workspace', users: 'Personnel Directory', topics: 'Topic Database', announcements: 'Global Broadcasts', notifications: 'Event Logs', stats: 'Telemetry', profile: 'Identity Management' };

      return (
        <div id="app-shell" className="fade-in">
          
          {/* SIDEBAR */}
          <aside className="sidebar">
            <div className="sidebar-header">
              <div className="sidebar-logo cursor-pointer" onClick={() => navigateTo('dashboard')}>
                <div className="brand-icon">CS</div>
                <div className="brand-text">
                  <h2>Project Unit</h2>
                  <p>FUDMA Core</p>
                </div>
              </div>
            </div>
            
            <div className="sidebar-nav">
              <div className="nav-group">
                <div className="nav-label">Main Navigation</div>
                <button className={`w-full nav-item ${page==='dashboard'?'active':''}`} onClick={() => navigateTo('dashboard')}><Icon name="dashboard"/> Dashboard</button>
                <button className={`w-full nav-item ${(page==='projects'||page==='project-detail')?'active':''}`} onClick={() => navigateTo('projects')}><Icon name="projects"/> Projects</button>
                {['admin', 'coordinator', 'supervisor'].includes(user.role) && (
                  <button className={`w-full nav-item ${page==='users'?'active':''}`} onClick={() => navigateTo('users')}><Icon name="users"/> People</button>
                )}
              </div>
              
              <div className="nav-group">
                <div className="nav-label">Ecosystem</div>
                <button className={`w-full nav-item ${page==='topics'?'active':''}`} onClick={() => navigateTo('topics')}><Icon name="topic"/> Topics Database</button>
                <button className={`w-full nav-item ${page==='announcements'?'active':''}`} onClick={() => navigateTo('announcements')}><Icon name="announce"/> Broadcasts</button>
                <button className={`w-full nav-item ${page==='notifications'?'active':''}`} onClick={() => navigateTo('notifications')}>
                  <Icon name="bell"/> Event Logs {unreadCount > 0 && <span className="nav-badge">{unreadCount}</span>}
                </button>
                {['admin', 'coordinator'].includes(user.role) && (
                  <button className={`w-full nav-item ${page==='stats'?'active':''}`} onClick={() => navigateTo('stats')}><Icon name="chart"/> Telemetry</button>
                )}
              </div>
            </div>
            
            <div className="sidebar-footer">
              <div className="user-profile-widget" onClick={() => navigateTo('profile')}>
                <Avatar initials={user.avatar_initials} size="sm" seed={user.username} />
                <div className="info">
                  <div className="name">{user.first_name} {user.last_name}</div>
                  <div className="role">{user.role}</div>
                </div>
                <button className="icon-btn" style={{ width: 28, height: 28, border: 'none', background: 'transparent' }} onClick={(e) => { e.stopPropagation(); handleLogout(); }} title="Terminate Session">
                  <Icon name="logout" size={14}/>
                </button>
              </div>
            </div>
          </aside>
          
          {/* MAIN AREA */}
          <main className="main-area">
            <header className="topbar">
              <div className="page-title">{pageTitles[page] || page}</div>
              
              <div className="topbar-tools">
                {/* Theme Toggle Widget */}
                <div className="theme-switch" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} title="Toggle Interface Protocol">
                  <div className="theme-switch-thumb"></div>
                  <div className="theme-icon dark"><Icon name="moon" size={12}/></div>
                  <div className="theme-icon light"><Icon name="sun" size={12}/></div>
                </div>

                {/* Notifications Widget */}
                <div className="notif-bell-container" ref={notifRef}>
                  <button className="icon-btn" onClick={() => setShowNotifPanel(!showNotifPanel)}>
                    <Icon name="bell" size={18}/>
                    {unreadCount > 0 && <span className="notif-dot"></span>}
                  </button>
                  
                  {showNotifPanel && (
                    <div className="notif-dropdown">
                      <div className="notif-header">
                        <span className="font-bold text-text font-display">System Events</span>
                        <div className="flex gap-2">
                          {unreadCount > 0 && <button className="btn btn-ghost btn-xs" onClick={markAllRead}>Ack All</button>}
                          <button className="btn btn-ghost btn-xs text-cyan" onClick={() => navigateTo('notifications')}>View Log</button>
                        </div>
                      </div>
                      <div className="notif-list">
                        {notifications.length === 0 ? (
                          <div className="empty-state py-8"><p className="text-sm">Logs are clear.</p></div>
                        ) : (
                          notifications.map(n => (
                            <div key={n.id} className={`notif-item ${!n.is_read ? 'unread' : ''}`} onClick={() => navigateTo('notifications')}>
                              <div className="notif-item-icon" style={{ background: 'var(--cyan-alpha)', color: 'var(--cyan)' }}><Icon name="bell" size={16}/></div>
                              <div className="flex-1 min-w-0">
                                <div className="font-bold text-sm text-text truncate mb-1">{n.title}</div>
                                <div className="text-xs text-muted line-clamp-2 leading-relaxed" style={{ display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{n.message}</div>
                                <div className="text-xs text-text3 mt-2 font-mono">{formatRelativeTime(n.created_at)}</div>
                              </div>
                              {!n.is_read && <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--cyan)', marginTop: 6, flexShrink: 0 }}></div>}
                            </div>
                          ))
                        )}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </header>

            {/* ROUTER SWITCH */}
            {page === 'dashboard' && <DashboardView user={user} navigateTo={navigateTo} />}
            {page === 'projects' && <ProjectsView user={user} navigateTo={navigateTo} />}
            {page === 'project-detail' && <ProjectDetailView projectId={pageParam} user={user} navigateTo={navigateTo} />}
            {page === 'users' && <UsersView user={user} navigateTo={navigateTo} />}
            {page === 'topics' && <TopicsView user={user} />}
            {page === 'announcements' && <AnnouncementsView user={user} />}
            {page === 'notifications' && <NotificationsView />}
            {page === 'stats' && <AnalyticsView />}
            {page === 'profile' && <ProfileView user={user} onUpdateUser={setUser} />}
            
          </main>
        </div>
      );
    };

    // Ignite React
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
