  const [sendingComment, setSendingComment] = useState(false);
  const [showMilestoneModal, setShowMilestoneModal] = useState(false);
  const [newMilestone, setNewMilestone] = useState({ title:'', description:'', due_date:'', status:'pending' });
  const [editStatus, setEditStatus] = useState('');
  const [supervisors, setSupervisors] = useState([]);

  const isAdmin = ['admin','coordinator'].includes(user.role);
  const isSupervisor = user.role === 'supervisor';
  const canEdit = isAdmin || isSupervisor;

  const refresh = () => {
    api.get(`/projects/${projectId}/`).then(d => { setProject(d); setEditStatus(d.status); }).catch(()=>showToast('Failed to load project','error')).finally(()=>setLoading(false));
  };

  useEffect(() => {
    refresh();
    if (canEdit) api.get('/auth/users/?role=supervisor').then(d=>setSupervisors(d.results||d));
  }, [projectId]);

  const postComment = async () => {
    if (!comment.trim()) return;
    setSendingComment(true);
    try {
      await api.post(`/projects/${projectId}/comments/`, { content: comment, is_feedback: isSupervisor||isAdmin });
      setComment('');
      refresh();
    } catch { showToast('Failed to post comment','error'); }
    finally { setSendingComment(false); }
  };

  const updateStatus = async (status) => {
    try {
      await api.patch(`/projects/${projectId}/`, { status });
      showToast('Status updated!','success');
      refresh();
    } catch { showToast('Failed to update status','error'); }
  };

  const updateMilestone = async (id, data) => {
    try {
      await api.patch(`/projects/${projectId}/milestones/${id}/`, data);
      showToast('Milestone updated','success');
      refresh();
    } catch { showToast('Failed to update milestone','error'); }
  };

  const addMilestone = async () => {
    try {
      await api.post(`/projects/${projectId}/milestones/`, newMilestone);
      showToast('Milestone added!','success');
      setShowMilestoneModal(false);
      setNewMilestone({ title:'', description:'', due_date:'', status:'pending' });
      refresh();
    } catch { showToast('Failed to add milestone','error'); }
  };

  if (loading) return <div className="page"><div style={{display:'flex',justifyContent:'center',paddingTop:80}}><div className="spinner"/></div></div>;
  if (!project) return <div className="page"><div className="empty-state"><p>Project not found</p></div></div>;

  const progress = project.progress_percent || 0;

  const statusOpts = [
    { value:'proposal', label:'Proposal' },
    { value:'approved', label:'Approved' },
    { value:'in_progress', label:'In Progress' },
    { value:'submitted', label:'Submitted' },
    { value:'revision', label:'Needs Revision' },
    { value:'completed', label:'Completed' },
    { value:'rejected', label:'Rejected' },
  ];

  return (
    <div className="page fade-in">
      {/* Back + header */}
      <div style={{marginBottom:'20px'}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>navigate('projects')} style={{marginBottom:'12px',paddingLeft:'4px'}}>
          ← Back to Projects
        </button>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'12px',flexWrap:'wrap'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'6px',flexWrap:'wrap'}}>
              <StatusBadge status={project.status}/>
              {project.session && <span className="tag">{project.session}</span>}
              {project.grade && <span className="tag" style={{background:'rgba(16,185,129,0.1)',color:'var(--green)',borderColor:'rgba(16,185,129,0.2)'}}>Grade: {project.grade}</span>}
            </div>
            <h1 style={{fontFamily:'var(--font-display)',fontSize:'1.4rem',fontWeight:'800',color:'var(--text)',lineHeight:1.3}}>{project.title}</h1>
          </div>

          {canEdit && (
            <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
              <select className="form-select" style={{width:'170px',fontSize:'0.82rem'}} value={editStatus} onChange={e=>{setEditStatus(e.target.value);updateStatus(e.target.value);}}>
                {statusOpts.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
              </select>
            </div>
          )}
        </div>
      </div>

      {/* Info bar */}
      <div style={{display:'flex',gap:'12px',marginBottom:'24px',flexWrap:'wrap'}}>
        {[
          { label:'Student', value: project.student?.first_name+' '+project.student?.last_name, sub: project.student?.matric_number },
          { label:'Supervisor', value: project.supervisor ? project.supervisor.first_name+' '+project.supervisor.last_name : 'Not Assigned', sub: project.supervisor ? 'Supervisor' : '' },
          { label:'Deadline', value: fmtDate(project.deadline), sub: 'Final submission' },
          { label:'Progress', value: `${progress}%`, sub: `${project.milestones?.filter(m=>m.status==='completed').length||0}/${project.milestones?.length||0} milestones` },
        ].map((item,i) => (
          <div key={i} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'10px',padding:'14px 18px',minWidth:'150px',flex:1}}>
            <div style={{fontSize:'0.7rem',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'4px'}}>{item.label}</div>
            <div style={{fontWeight:600,color:'var(--text)',fontSize:'0.9rem'}}>{item.value}</div>
            {item.sub && <div style={{fontSize:'0.72rem',color:'var(--text3)',marginTop:'2px'}}>{item.sub}</div>}
          </div>
        ))}
      </div>

      {/* Progress */}
      <div style={{marginBottom:'24px'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}>
          <span style={{fontSize:'0.82rem',color:'var(--text3)',fontWeight:500}}>Overall Progress</span>
          <span style={{fontSize:'0.82rem',color:'var(--accent2)',fontWeight:700}}>{progress}%</span>
        </div>
        <ProgressBar value={progress} height={12}/>
      </div>

      {/* Tabs */}
      <div className="tabs">
        {['overview','milestones','comments','documents'].map(t=>(
          <button key={t} className={`tab-btn ${tab===t?'active':''}`} onClick={()=>setTab(t)}
            style={{textTransform:'capitalize'}}>
            {t}{t==='comments'&&project.comments?.length>0?` (${project.comments.length})`:''}{t==='documents'&&project.documents?.length>0?` (${project.documents.length})`:''}{t==='milestones'&&project.milestones?.length>0?` (${project.milestones.length})`:''}
          </button>
        ))}
      </div>

      {/* Overview */}
      {tab === 'overview' && (
        <div className="two-col fade-in">
          <div>
            <div className="card" style={{marginBottom:'16px'}}>
              <div className="card-header"><span className="card-title">Abstract</span></div>
              <div className="card-body">
                <p style={{color:'var(--text2)',lineHeight:1.7,fontSize:'0.875rem'}}>{project.abstract || <em style={{color:'var(--text3)'}}>No abstract provided.</em>}</p>
              </div>
            </div>
            {(project.keywords||project.tools_used) && (
              <div className="card">
                <div className="card-header"><span className="card-title">Details</span></div>
                <div className="card-body">
                  {project.keywords && <div style={{marginBottom:'12px'}}>
                    <div style={{fontSize:'0.75rem',color:'var(--text3)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Keywords</div>
                    {project.keywords.split(',').map(k=><span key={k} className="tag">{k.trim()}</span>)}
                  </div>}
                  {project.tools_used && <div>
                    <div style={{fontSize:'0.75rem',color:'var(--text3)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Tools & Technologies</div>
                    {project.tools_used.split(',').map(t=><span key={t} className="tag" style={{background:'rgba(59,130,246,0.08)',color:'var(--accent2)',borderColor:'rgba(59,130,246,0.2)'}}>{t.trim()}</span>)}
                  </div>}
                </div>
              </div>
            )}
          </div>
          <div>
            <div className="card">
              <div className="card-header"><span className="card-title">Team</span></div>
              <div className="card-body">
                {[
                  { label:'Student', person: project.student },
                  { label:'Supervisor', person: project.supervisor },
                ].map(({label, person}) => person && (
                  <div key={label} style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                    <AvatarEl initials={person.avatar_initials} colorSeed={person.username} size="lg"/>
                    <div>
                      <div style={{fontWeight:600,color:'var(--text)'}}>{person.first_name} {person.last_name}</div>
                      <div style={{fontSize:'0.78rem',color:'var(--text3)',marginTop:'2px'}}>{person.email}</div>
                      <div style={{marginTop:'4px'}}><span className={`role-badge role-${person.role}`}>{label}</span></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Milestones */}
      {tab === 'milestones' && (
        <div className="fade-in">
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:'16px'}}>
            <div/>
            {canEdit && (
              <button className="btn btn-primary btn-sm" onClick={()=>setShowMilestoneModal(true)}>
                <Icon name="plus" size={14}/> Add Milestone
              </button>
            )}
          </div>
          <div className="card">
            <div style={{padding:'0 20px'}}>
              {project.milestones?.length > 0 ? (
                <div className="milestone-list">
                  {project.milestones.map(m => (
                    <div key={m.id} className="milestone-item">
                      <div className={`milestone-dot ${m.status}`}>
                        {m.status==='completed'?<Icon name="check" size={12}/>:m.status==='overdue'?<Icon name="x" size={12}/>:<Icon name="clock" size={12}/>}
                      </div>
                      <div className="milestone-info" style={{flex:1}}>
                        <div className="title">{m.title}</div>
                        {m.description && <div style={{fontSize:'0.78rem',color:'var(--text3)',marginTop:'3px'}}>{m.description}</div>}
                        <div className="due">{m.due_date?`Due: ${fmtDate(m.due_date)}`:'No due date'}</div>
                      </div>
                      <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
                        <span className={`badge-status status-${m.status}`} style={{fontSize:'0.7rem'}}>{m.status.replace('_',' ')}</span>
                        {canEdit && m.status !== 'completed' && (
                          <button className="btn btn-success btn-xs" onClick={()=>updateMilestone(m.id,{status:'completed'})}>
                            <Icon name="check" size={11}/> Done
                          </button>
                        )}
                        {canEdit && m.status === 'pending' && (
                          <button className="btn btn-secondary btn-xs" onClick={()=>updateMilestone(m.id,{status:'in_progress'})}>
                            Start
                          </button>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              ) : <div className="empty-state"><Icon name="clock" size={36}/><p>No milestones added yet</p></div>}
            </div>
          </div>
        </div>
      )}

      {/* Comments */}
      {tab === 'comments' && (
        <div className="fade-in">
          <div className="comment-list" style={{marginBottom:'20px'}}>
            {project.comments?.length > 0 ? project.comments.map(c => (
              <div key={c.id} className="comment-item">
                <AvatarEl initials={c.author_initials} colorSeed={c.author_initials} size="sm"/>
                <div className={`comment-bubble ${c.is_feedback?'feedback':''}`}>
                  <div className="comment-meta">
                    <span className="comment-name">{c.author_name}</span>
                    <span className="comment-role-badge">{c.author_role}</span>
                    {c.is_feedback && <span style={{fontSize:'0.68rem',padding:'1px 6px',borderRadius:'4px',background:'rgba(59,130,246,0.1)',color:'var(--accent2)'}}>Feedback</span>}
                    <span className="comment-time">{fmtRelative(c.created_at)}</span>
                  </div>
                  <div className="comment-body">{c.content}</div>
                </div>
              </div>
            )) : <div className="empty-state"><Icon name="msg" size={36}/><p>No comments yet. Start the conversation!</p></div>}
          </div>
          <div style={{display:'flex',gap:'10px',alignItems:'flex-end'}}>
            <AvatarEl initials={user.avatar_initials} colorSeed={user.username} size="sm"/>
            <div style={{flex:1}}>
              <textarea className="form-textarea" style={{minHeight:'70px',marginBottom:0}}
                placeholder="Write a comment or feedback…"
                value={comment}
                onChange={e=>setComment(e.target.value)}
              />
              <div style={{display:'flex',justifyContent:'flex-end',marginTop:'8px'}}>
                <button className="btn btn-primary btn-sm" onClick={postComment} disabled={sendingComment||!comment.trim()}>
                  {sendingComment?<span className="spinner spinner-sm"/>:<><Icon name="msg" size={13}/> Post</>}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Documents */}
      {tab === 'documents' && (
        <div className="fade-in">
          <div style={{marginBottom:'16px',display:'flex',justifyContent:'flex-end'}}>
            <label className="btn btn-secondary btn-sm" style={{cursor:'pointer'}}>
              <Icon name="upload" size={14}/> Upload Document
              <input type="file" style={{display:'none'}} onChange={async e=>{
                const file = e.target.files[0];
                if (!file) return;
                const fd = new FormData();
                fd.append('file', file);
                fd.append('title', file.name);
                fd.append('doc_type', 'other');
                try {
                  const res = await fetch(`/api/projects/${projectId}/documents/`, {
                    method:'POST', headers:{'Authorization':`Token ${api.token()}`}, body: fd
                  });
                  if (res.ok) { showToast('Document uploaded!','success'); refresh(); }
                  else showToast('Upload failed','error');
                } catch { showToast('Upload failed','error'); }
                e.target.value = '';
              }}/>
            </label>
          </div>
          {project.documents?.length > 0 ? (
            <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
              {project.documents.map(d => (
                <div key={d.id} style={{display:'flex',alignItems:'center',gap:'14px',padding:'14px 18px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'12px'}}>
                  <div style={{width:42,height:42,borderRadius:'10px',background:'rgba(59,130,246,0.1)',color:'var(--accent2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <Icon name="projects" size={20}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,color:'var(--text)',fontSize:'0.875rem'}}>{d.title}</div>
                    <div style={{fontSize:'0.72rem',color:'var(--text3)',marginTop:'3px'}}>
                      {d.doc_type} · {d.uploaded_by_name} · {fmtDate(d.uploaded_at)} · {d.file_size?`${(d.file_size/1024).toFixed(1)} KB`:''}
                    </div>
                  </div>
                  {d.file_url && (
                    <a href={d.file_url} target="_blank" rel="noreferrer" className="btn btn-secondary btn-sm" onClick={e=>e.stopPropagation()}>
                      <Icon name="download" size={13}/> Download
                    </a>
                  )}
                </div>
              ))}
            </div>
          ) : <div className="empty-state"><Icon name="upload" size={36}/><p>No documents uploaded yet</p></div>}
        </div>
      )}

      {/* Add Milestone Modal */}
      {showMilestoneModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowMilestoneModal(false)}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">Add Milestone</span>
              <button className="btn btn-ghost" style={{padding:'6px'}} onClick={()=>setShowMilestoneModal(false)}><Icon name="x" size={16}/></button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Title *</label>
                <input className="form-input" placeholder="e.g. Literature Review" value={newMilestone.title} onChange={e=>setNewMilestone(f=>({...f,title:e.target.value}))} />
              </div>
              <div className="form-group">
                <label className="form-label">Description</label>
                <textarea className="form-textarea" placeholder="What should be done…" value={newMilestone.description} onChange={e=>setNewMilestone(f=>({...f,description:e.target.value}))} />
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
                <div className="form-group">
                  <label className="form-label">Due Date</label>
                  <input type="date" className="form-input" value={newMilestone.due_date} onChange={e=>setNewMilestone(f=>({...f,due_date:e.target.value}))} />
                </div>
                <div className="form-group">
                  <label className="form-label">Initial Status</label>
                  <select className="form-select" value={newMilestone.status} onChange={e=>setNewMilestone(f=>({...f,status:e.target.value}))}>
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                  </select>
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowMilestoneModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={addMilestone} disabled={!newMilestone.title}>Add Milestone</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── Users ────────────────────────────────────────────────────
const UsersPage = ({ user: currentUser }) => {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [roleFilter, setRoleFilter] = useState('');
  const [search, setSearch] = useState('');

  useEffect(() => {
    let url = '/auth/users/';
    if (roleFilter) url += `?role=${roleFilter}`;
    api.get(url).then(d=>setUsers(d.results||d)).catch(()=>showToast('Failed to load users','error')).finally(()=>setLoading(false));
  }, [roleFilter]);

  const filtered = users.filter(u =>
    !search || (u.first_name+' '+u.last_name+' '+u.username+' '+(u.matric_number||'')).toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div className="page fade-in">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'24px',flexWrap:'wrap',gap:'12px'}}>
        <div>
          <h1 style={{fontFamily:'var(--font-display)',fontSize:'1.4rem',fontWeight:'800'}}>People</h1>
          <p style={{color:'var(--text3)',fontSize:'0.82rem',marginTop:'3px'}}>{filtered.length} member{filtered.length!==1?'s':''}</p>
        </div>
      </div>

      <div style={{display:'flex',gap:'10px',marginBottom:'20px',flexWrap:'wrap'}}>
        <div className="search-bar" style={{flex:1,minWidth:'200px'}}>
          <Icon name="search" size={15}/>
          <input placeholder="Search by name, matric…" value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
        <select className="form-select" style={{width:'150px'}} value={roleFilter} onChange={e=>setRoleFilter(e.target.value)}>
          <option value="">All Roles</option>
          <option value="student">Students</option>
          <option value="supervisor">Supervisors</option>
          <option value="coordinator">Coordinators</option>
        </select>
      </div>

      {loading ? (
        <div style={{display:'flex',justifyContent:'center',paddingTop:60}}><div className="spinner"/></div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:'14px'}}>
          {filtered.map(u => (
            <div key={u.id} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'14px',padding:'20px',transition:'border-color 0.2s,transform 0.2s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.transform='translateY(-2px)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.transform='';}}
            >
              <div style={{display:'flex',gap:'12px',alignItems:'flex-start',marginBottom:'14px'}}>
                <AvatarEl initials={u.avatar_initials} colorSeed={u.username} size="lg"/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,color:'var(--text)',fontSize:'0.95rem'}}>{u.full_name}</div>
                  <div style={{fontSize:'0.75rem',color:'var(--text3)',marginTop:'2px'}}>{u.email}</div>
                  <div style={{marginTop:'6px',display:'flex',gap:'6px',flexWrap:'wrap'}}>
                    <span className={`role-badge role-${u.role}`}>{u.role}</span>
                    {u.level && <span className="tag" style={{fontSize:'0.68rem'}}>{u.level}</span>}
                  </div>
                </div>
              </div>
              {u.matric_number && (
                <div style={{display:'flex',gap:'8px',padding:'8px 12px',background:'var(--surface)',borderRadius:'8px'}}>
                  <span style={{fontSize:'0.72rem',color:'var(--text3)'}}>Matric:</span>
                  <span style={{fontSize:'0.72rem',color:'var(--text2)',fontFamily:'monospace',fontWeight:600}}>{u.matric_number}</span>
                </div>
              )}
              {u.session && <div style={{fontSize:'0.72rem',color:'var(--text3)',marginTop:'8px'}}>Session: {u.session}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ─── Topics ───────────────────────────────────────────────────
const TopicsPage = ({ user }) => {
  const [topics, setTopics] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ title:'', description:'' });

  const load = () => api.get('/topics/').then(d=>setTopics(d.results||d)).finally(()=>setLoading(false));
  useEffect(() => { load(); }, []);

  const create = async () => {
    try {
      await api.post('/topics/', form);
      showToast('Topic added!','success');
      setShowModal(false);
      setForm({title:'',description:''});
      load();
    } catch { showToast('Failed to add topic','error'); }
  };

  return (
    <div className="page fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px'}}>
        <h1 style={{fontFamily:'var(--font-display)',fontSize:'1.4rem',fontWeight:'800'}}>Project Topics</h1>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}><Icon name="plus" size={15}/> Suggest Topic</button>
      </div>
      {loading ? <div style={{display:'flex',justifyContent:'center',paddingTop:60}}><div className="spinner"/></div> : (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'14px'}}>
          {topics.map(t => (
            <div key={t.id} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'14px',padding:'20px',transition:'all 0.2s'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border2)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
              <div style={{display:'flex',alignItems:'flex-start',gap:'10px',marginBottom:'10px'}}>
                <div style={{width:36,height:36,borderRadius:'10px',background:'rgba(59,130,246,0.1)',color:'var(--accent2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <Icon name="topic" size={16}/>
                </div>
                <div>
                  <div style={{fontWeight:600,color:'var(--text)',fontSize:'0.9rem',lineHeight:1.3}}>{t.title}</div>
                  <span className={`badge-status ${t.is_available?'status-approved':'status-rejected'}`} style={{marginTop:'5px',fontSize:'0.68rem'}}>
                    {t.is_available?'Available':'Taken'}
                  </span>
                </div>
              </div>
              {t.description && <p style={{fontSize:'0.8rem',color:'var(--text3)',lineHeight:1.5}}>{t.description}</p>}
              <div style={{fontSize:'0.7rem',color:'var(--text3)',marginTop:'10px'}}>{fmtDate(t.created_at)}</div>
            </div>
          ))}
        </div>
      )}

      {showModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">Suggest a Topic</span>
              <button className="btn btn-ghost" style={{padding:'6px'}} onClick={()=>setShowModal(false)}><Icon name="x" size={16}/></button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Topic Title *</label>
                <input className="form-input" placeholder="e.g. AI-Powered Attendance System" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} />
              </div>
              <div className="form-group">
                <label className="form-label">Description</label>
                <textarea className="form-textarea" placeholder="Brief description of what the project will cover…" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} />
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={create} disabled={!form.title}>Submit Topic</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── Announcements ────────────────────────────────────────────
const AnnouncementsPage = ({ user }) => {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ title:'', body:'', target_role:'', is_pinned: false });
  const canCreate = ['admin','coordinator','supervisor'].includes(user.role);

  const load = () => api.get('/announcements/').then(d=>setItems(d.results||d)).finally(()=>setLoading(false));
  useEffect(() => { load(); }, []);

  const create = async () => {
    try {
      await api.post('/announcements/', form);
      showToast('Announcement posted!','success');
      setShowModal(false);
      setForm({title:'',body:'',target_role:'',is_pinned:false});
      load();
    } catch { showToast('Failed to post','error'); }
  };

  return (
    <div className="page fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px'}}>
        <h1 style={{fontFamily:'var(--font-display)',fontSize:'1.4rem',fontWeight:'800'}}>Announcements</h1>
        {canCreate && <button className="btn btn-primary" onClick={()=>setShowModal(true)}><Icon name="plus" size={15}/> Post</button>}
      </div>
      {loading ? <div style={{display:'flex',justifyContent:'center',paddingTop:60}}><div className="spinner"/></div> : items.length === 0 ?
        <div className="empty-state"><Icon name="announce" size={40}/><p>No announcements yet</p></div> :
        items.map(a => (
          <div key={a.id} className={`announcement-card ${a.is_pinned?'pinned':''}`}>
            {a.is_pinned && <span className="pin-icon"><Icon name="pin" size={14}/></span>}
            <div className="ann-title" style={{fontSize:'1rem'}}>{a.title}</div>
            <div className="ann-body">{a.body}</div>
            <div className="ann-meta" style={{display:'flex',gap:'12px',flexWrap:'wrap'}}>
              <span>By {a.author_name}</span>
              <span>{fmtRelative(a.created_at)}</span>
              {a.target_role && <span className={`role-badge role-${a.target_role}`}>For {a.target_role}s</span>}
              {a.is_pinned && <span style={{color:'var(--yellow)',fontSize:'0.7rem'}}>📌 Pinned</span>}
            </div>
          </div>
        ))
      }

      {showModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">Post Announcement</span>
              <button className="btn btn-ghost" style={{padding:'6px'}} onClick={()=>setShowModal(false)}><Icon name="x" size={16}/></button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Title *</label>
                <input className="form-input" placeholder="Announcement title" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} />
              </div>
              <div className="form-group">
                <label className="form-label">Message *</label>
                <textarea className="form-textarea" style={{minHeight:'120px'}} placeholder="Write the announcement…" value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))} />
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:'12px',alignItems:'end'}}>
                <div className="form-group" style={{marginBottom:0}}>
                  <label className="form-label">Target Audience</label>
                  <select className="form-select" value={form.target_role} onChange={e=>setForm(f=>({...f,target_role:e.target.value}))}>
                    <option value="">Everyone</option>
                    <option value="student">Students Only</option>
                    <option value="supervisor">Supervisors Only</option>
                  </select>
                </div>
                <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',padding:'10px 0',fontSize:'0.82rem',color:'var(--text2)'}}>
                  <input type="checkbox" checked={form.is_pinned} onChange={e=>setForm(f=>({...f,is_pinned:e.target.checked}))} />
                  📌 Pin it
                </label>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={create} disabled={!form.title||!form.body}>Post</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── Notifications ────────────────────────────────────────────
const NotificationsPage = () => {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    api.get('/notifications/').then(d=>setItems(d.results||d)).finally(()=>setLoading(false));
    api.post('/notifications/read/', {});
  }, []);

  const typeColors = { success:'var(--green)', info:'var(--accent)', warning:'var(--yellow)', deadline:'var(--red)', comment:'var(--purple)', status:'var(--cyan)', assignment:'var(--orange)' };

  return (
    <div className="page fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px'}}>
        <h1 style={{fontFamily:'var(--font-display)',fontSize:'1.4rem',fontWeight:'800'}}>Notifications</h1>
        <button className="btn btn-secondary btn-sm" onClick={()=>api.post('/notifications/read/',{}).then(()=>{setItems(i=>i.map(n=>({...n,is_read:true})));showToast('All marked as read','success');})}>
          Mark all read
        </button>
      </div>
      {loading ? <div style={{display:'flex',justifyContent:'center',paddingTop:60}}><div className="spinner"/></div> :
        items.length === 0 ? <div className="empty-state"><Icon name="bell" size={40}/><p>No notifications</p></div> :
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {items.map(n => (
            <div key={n.id} style={{display:'flex',gap:'12px',padding:'16px',background:'var(--bg2)',border:`1px solid ${n.is_read?'var(--border)':'rgba(59,130,246,0.25)'}`,borderRadius:'12px',transition:'all 0.2s',background:n.is_read?'var(--bg2)':'rgba(59,130,246,0.04)'}}>
              <div className="notif-icon" style={{background:`${(typeColors[n.notif_type]||'var(--accent)')}20`,color:typeColors[n.notif_type]||'var(--accent)'}}>
                <Icon name="bell" size={16}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,color:'var(--text)',fontSize:'0.875rem'}}>{n.title}</div>
                <div style={{fontSize:'0.8rem',color:'var(--text3)',marginTop:'3px',lineHeight:1.5}}>{n.message}</div>
                <div style={{fontSize:'0.7rem',color:'var(--text3)',marginTop:'6px'}}>{fmtRelative(n.created_at)}</div>
              </div>
              {!n.is_read && <div style={{width:8,height:8,borderRadius:'50%',background:'var(--accent)',flexShrink:0,marginTop:6}}/>}
            </div>
          ))}
        </div>
      }
    </div>
  );
};

// ─── Analytics ────────────────────────────────────────────────
const AnalyticsPage = () => {
  const [stats, setStats] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => { api.get('/stats/').then(setStats).finally(()=>setLoading(false)); }, []);

  if (loading) return <div className="page"><div style={{display:'flex',justifyContent:'center',paddingTop:80}}><div className="spinner"/></div></div>;
  if (!stats) return null;

  const statusColors = { proposal:'var(--text3)',approved:'var(--cyan)',in_progress:'var(--accent)',submitted:'var(--purple)',revision:'var(--yellow)',completed:'var(--green)',rejected:'var(--red)' };
  const total = stats.total || 1;

  return (
    <div className="page fade-in">
      <h1 style={{fontFamily:'var(--font-display)',fontSize:'1.4rem',fontWeight:'800',marginBottom:'24px'}}>Analytics</h1>

      <div className="stat-grid" style={{marginBottom:'28px'}}>
        {[
          {label:'Total Projects',value:stats.total,color:'blue',icon:'projects'},
          {label:'Total Students',value:stats.total_students,color:'cyan',icon:'users'},
          {label:'Total Supervisors',value:stats.total_supervisors,color:'purple',icon:'users'},
          {label:'Completed',value:stats.by_status?.completed?.count||0,color:'green',icon:'check'},
        ].map((s,i)=>(
          <div key={i} className={`stat-card ${s.color}`}>
            <div className="label">{s.label}</div>
            <div className="value">{s.value}</div>
            <div className="icon-wrap"><Icon name={s.icon} size={18}/></div>
          </div>
        ))}
      </div>

      <div className="two-col">
        <div className="card">
          <div className="card-header"><span className="card-title">Projects by Status</span></div>
          <div className="card-body">
            {Object.entries(stats.by_status||{}).map(([status, info]) => (
              <div key={status} style={{marginBottom:'16px'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                    <div style={{width:10,height:10,borderRadius:'50%',background:statusColors[status]||'var(--text3)',flexShrink:0}}/>
                    <span style={{fontSize:'0.82rem',color:'var(--text2)'}}>{info.label}</span>
                  </div>
                  <span style={{fontSize:'0.82rem',fontWeight:600,color:'var(--text)'}}>{info.count}</span>
                </div>
                <div style={{height:8,background:'var(--surface)',borderRadius:99,overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:99,background:statusColors[status]||'var(--text3)',width:`${(info.count/total)*100}%`,transition:'width 0.5s ease'}}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="card">
          <div className="card-header"><span className="card-title">Academic Sessions</span></div>
          <div className="card-body">
            {stats.sessions?.length > 0 ? stats.sessions.filter(Boolean).map(s => (
              <div key={s} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',background:'var(--surface)',borderRadius:'10px',marginBottom:'8px'}}>
                <span style={{fontWeight:600,color:'var(--text)',fontFamily:'var(--font-display)'}}>{s}</span>
                <span className="tag">Session</span>
              </div>
            )) : <div className="empty-state" style={{padding:'20px'}}><p>No session data</p></div>}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── Profile Page ─────────────────────────────────────────────
const ProfilePage = ({ user, onUpdate }) => {
  const [form, setForm] = useState({ ...user });
  const [saving, setSaving] = useState(false);
  const [pwForm, setPwForm] = useState({ old_password:'', new_password1:'', new_password2:'' });

  const save = async () => {
    setSaving(true);
    try {
      const updated = await api.patch('/auth/profile/', form);
      onUpdate(updated);
      showToast('Profile updated!','success');
    } catch(e) {
      showToast(Object.values(e.data||{}).flat().join(' ')||'Failed to update','error');
    } finally { setSaving(false); }
  };

  return (
    <div className="page fade-in">
      <h1 style={{fontFamily:'var(--font-display)',fontSize:'1.4rem',fontWeight:'800',marginBottom:'24px'}}>My Profile</h1>
      <div className="two-col">
        <div className="card">
          <div className="card-header"><span className="card-title">Personal Information</span></div>
          <div className="card-body">
            <div style={{display:'flex',alignItems:'center',gap:'16px',marginBottom:'24px',padding:'16px',background:'var(--surface)',borderRadius:'12px'}}>
              <AvatarEl initials={form.avatar_initials} colorSeed={form.username} size="lg"/>
              <div>
                <div style={{fontFamily:'var(--font-display)',fontWeight:'700',fontSize:'1.05rem',color:'var(--text)'}}>{form.first_name} {form.last_name}</div>
                <div style={{color:'var(--text3)',fontSize:'0.8rem',marginTop:'3px'}}>{form.email}</div>
                <span className={`role-badge role-${form.role}`} style={{marginTop:'6px',display:'inline-block'}}>{form.role}</span>
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
              {[['first_name','First Name'],['last_name','Last Name']].map(([k,l])=>(
                <div key={k} className="form-group" style={{marginBottom:0}}>
                  <label className="form-label">{l}</label>
                  <input className="form-input" value={form[k]||''} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} />
                </div>
              ))}
            </div>
            <div className="form-group" style={{marginTop:'12px'}}>
              <label className="form-label">Email</label>
              <input className="form-input" type="email" value={form.email||''} onChange={e=>setForm(f=>({...f,email:e.target.value}))} />
            </div>
            <div className="form-group">
              <label className="form-label">Phone</label>
              <input className="form-input" placeholder="+234 800 000 0000" value={form.phone||''} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} />
            </div>
            <div className="form-group">
              <label className="form-label">Bio</label>
              <textarea className="form-textarea" placeholder="Tell us about yourself…" value={form.bio||''} onChange={e=>setForm(f=>({...f,bio:e.target.value}))} />
            </div>

            <button className="btn btn-primary" style={{width:'100%'}} onClick={save} disabled={saving}>
              {saving?<span className="spinner spinner-sm"/>:'Save Changes'}
            </button>
          </div>
        </div>

        <div>
          <div className="card">
            <div className="card-header"><span className="card-title">Account Details</span></div>
            <div className="card-body">
              {[
                ['Username', user.username],
                ['Role', user.role],
                ['Department', user.department],
                ['Level', user.level||'—'],
                ['Session', user.session||'—'],
                ['Matric No.', user.matric_number||'—'],
                ['Member Since', fmtDate(user.date_joined)],
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                  <span style={{fontSize:'0.82rem',color:'var(--text3)'}}>{k}</span>
                  <span style={{fontSize:'0.82rem',fontWeight:500,color:'var(--text)',fontFamily:k==='Username'||k==='Matric No.'?'monospace':'inherit'}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── App ──────────────────────────────────────────────────────
const App = () => {
  const [user, setUser] = useState(null);
  const [ready, setReady] = useState(false);
  const [page, setPage] = useState('dashboard');
  const [pageParam, setPageParam] = useState(null);
  const [unreadCount, setUnreadCount] = useState(0);
  const [showNotifPanel, setShowNotifPanel] = useState(false);
  const [notifications, setNotifications] = useState([]);
  const notifRef = useRef(null);

  // Boot
  useEffect(() => {
    const token = localStorage.getItem('token');
    if (token) {
      api.get('/auth/profile/').then(u => { setUser(u); }).catch(() => localStorage.removeItem('token')).finally(() => {
        setTimeout(() => setReady(true), 600);
      });
    } else {
      setTimeout(() => setReady(true), 600);
    }
  }, []);

  // Load unread count
  useEffect(() => {
    if (!user) return;
    const fetchNotifs = () => {
      api.get('/notifications/').then(d => {
        const items = d.results || d;
        setNotifications(items.slice(0,10));
        setUnreadCount(items.filter(n=>!n.is_read).length);
      }).catch(()=>{});
    };
    fetchNotifs();
    const interval = setInterval(fetchNotifs, 30000);
    return () => clearInterval(interval);
  }, [user]);

  // Close notif panel on outside click
  useEffect(() => {
    const handler = e => { if (notifRef.current && !notifRef.current.contains(e.target)) setShowNotifPanel(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const navigate = (p, param=null) => { setPage(p); setPageParam(param); setShowNotifPanel(false); };

  const logout = async () => {
    try { await api.post('/auth/logout/'); } catch {}
    localStorage.removeItem('token');
    setUser(null);
    setPage('dashboard');
    showToast('Logged out successfully', 'info');
  };

  // Hide loading screen
  useEffect(() => {
    if (ready) {
      const ls = document.getElementById('loading-screen');
      if (ls) { ls.style.opacity='0'; setTimeout(()=>ls.remove(), 400); }
    }
  }, [ready]);

  if (!ready) return null;
  if (!user) return <AuthPage onLogin={u=>{ setUser(u); setPage('dashboard'); }} />;

  const pageTitle = { dashboard:'Dashboard', projects:'Projects', 'project-detail':'Project Detail', users:'People', topics:'Topics', announcements:'Announcements', notifications:'Notifications', stats:'Analytics', profile:'My Profile' };

  const markAllRead = () => {
    api.post('/notifications/read/', {}).then(() => {
      setUnreadCount(0);
      setNotifications(n=>n.map(x=>({...x,is_read:true})));
    });
  };

  return (
    <div id="app-shell">
      <Sidebar user={user} currentPage={page} navigate={navigate} onLogout={logout} unreadCount={unreadCount} />
      <div className="main-content">
        <div className="topbar">
          <span className="topbar-title">{pageTitle[page] || page}</span>
          <div className="topbar-actions">
            <div ref={notifRef} style={{position:'relative'}}>
              <div className="icon-btn" onClick={()=>setShowNotifPanel(v=>!v)}>
                <Icon name="bell" size={16}/>
                {unreadCount > 0 && <span className="notif-dot"/>}
              </div>
              {showNotifPanel && (
                <div className="notif-panel">
                  <div style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontWeight:700,fontSize:'0.9rem',fontFamily:'var(--font-display)'}}>Notifications</span>
                    <div style={{display:'flex',gap:'8px'}}>
                      {unreadCount>0&&<button className="btn btn-ghost btn-xs" onClick={markAllRead}>Mark all read</button>}
                      <button className="btn btn-ghost btn-xs" onClick={()=>navigate('notifications')}>View all</button>
                    </div>
                  </div>
                  {notifications.length === 0 ? (
                    <div className="empty-state" style={{padding:'24px'}}><p>All caught up!</p></div>
                  ) : notifications.slice(0,8).map(n => (
                    <div key={n.id} className={`notif-item ${!n.is_read?'unread':''}`} onClick={()=>{navigate('notifications');setShowNotifPanel(false);}}>
                      <div className="notif-icon" style={{background:'rgba(59,130,246,0.1)',color:'var(--accent2)'}}><Icon name="bell" size={14}/></div>
                      <div className="notif-content">
                        <div className="notif-title">{n.title}</div>
                        <div className="notif-msg">{n.message.substring(0,70)}{n.message.length>70?'...':''}</div>
                        <div className="notif-time">{fmtRelative(n.created_at)}</div>
                      </div>
                      {!n.is_read&&<div style={{width:8,height:8,borderRadius:'50%',background:'var(--accent)',flexShrink:0,marginTop:6}}/>}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="icon-btn" onClick={()=>navigate('profile')} data-tip="Profile">
              <Icon name="profile" size={16}/>
            </div>
          </div>
        </div>

        {page === 'dashboard' && <Dashboard user={user} navigate={navigate} />}
        {page === 'projects' && <ProjectsList user={user} navigate={navigate} />}
        {page === 'project-detail' && <ProjectDetail projectId={pageParam} user={user} navigate={navigate} />}
        {page === 'users' && <UsersPage user={user} />}
        {page === 'topics' && <TopicsPage user={user} />}
        {page === 'announcements' && <AnnouncementsPage user={user} />}
        {page === 'notifications' && <NotificationsPage />}
        {page === 'stats' && <AnalyticsPage />}
        {page === 'profile' && <ProfilePage user={user} onUpdate={u=>{setUser(u);showToast('Profile updated!','success');}} />}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
